version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: nexora:latest
    container_name: nexora_backend
    command:
      - uvicorn
      - src.server:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: nexora:latest
    container_name: nexora_worker
    command:
      - celery
      - -A
      - src.services.celery:celery_app
      - worker
      - --loglevel=info
    env_file:
      - .env.docker
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nexora_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data: